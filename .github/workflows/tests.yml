name: Tests

on:
  pull_request:
    branches: [master]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.12', '3.13', '3.14']
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install pinned opencode
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pinned_version="1.15.7"
          echo "Installing opencode pinned: $pinned_version"
          curl -fsSL https://opencode.ai/install | bash -s -- --version "$pinned_version"
          "$HOME/.opencode/bin/opencode" --version
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run make init (includes managed CodeQL install)
        run: make init

      - name: Run pytest with coverage
        id: pytest
        run: |
          pytest -q --cov=. --cov-report=xml --cov-report=html --cov-report=term tests
        continue-on-error: true

      - name: Run frontmatter validator
        id: frontmatter
        run: python tools/check-frontmatter.py
        continue-on-error: true

      - name: Report failures
        if: steps.pytest.outcome == 'failure' || steps.frontmatter.outcome == 'failure'
        run: |
          echo "::error::One or more test/validation steps failed."
          if [[ "${{ steps.pytest.outcome }}" == "failure" ]]; then echo "::error::pytest failed"; fi
          if [[ "${{ steps.frontmatter.outcome }}" == "failure" ]]; then echo "::error::frontmatter validator failed"; fi
          exit 1

      - name: Upload coverage HTML report
        if: always() && (steps.pytest.outcome == 'success' || steps.pytest.outcome == 'failure')
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-${{ matrix.os }}-py${{ matrix.python-version }}
          path: htmlcov/
          retention-days: 7

      # Only post one coverage comment per PR (ubuntu + 3.14)
      - name: Post coverage comment
        if: >-
          matrix.os == 'ubuntu-latest' &&
          matrix.python-version == '3.14' &&
          github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const xml = fs.readFileSync('coverage.xml', 'utf8');
            
            // Parse total coverage from XML
            const match = xml.match(/<coverage[^>]*line-rate="([0-9.]+)"/);
            const lineRate = match ? parseFloat(match[1]) : 0;
            const percentage = (lineRate * 100).toFixed(1);
            
            // Count covered/missing lines
            let totalLines = 0;
            let coveredLines = 0;
            const classMatches = xml.matchAll(/<class[^>]*line-rate="([0-9.]+)"[^>]*lines-valid="(\d+)"[^>]*lines-covered="(\d+)"/g);
            for (const m of classMatches) {
              totalLines += parseInt(m[2], 10);
              coveredLines += parseInt(m[3], 10);
            }
            
            const body = `## Coverage Report
            
            | Metric | Value |
            |--------|-------|
            | **Line Coverage** | ${percentage}% |
            | **Lines Covered** | ${coveredLines} / ${totalLines} |
            
            > Download detailed HTML coverage reports per OS/Python from the workflow artifacts.
            
            *Generated by pytest-cov on \`${new Date().toISOString()}\`*`;
            
            // Find existing comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('## Coverage Report')
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
