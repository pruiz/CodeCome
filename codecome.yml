project:
  name: "codecome-target"
  source_path: "./src"
  profile: "auto"
  languages:
    - "auto"

target:
  description: "Source code to be audited by CodeCome."
  assumptions:
    - "The agent must infer the target type during reconnaissance."
    - "The source may be a web app, service, CLI tool, library, benchmark corpus, infrastructure repository, firmware tree, or mixed project."
    - "Target-specific logic must live in skills, notes, or adapters, not in the core workflow."

audit:
  mode: "sequential"

  phases:
    - reconnaissance
    - hypothesis_generation
    - counter_analysis
    - validation
    - exploit_development
    - reporting

  file_scoring:
    enabled: true
    output: "./itemdb/notes/file-risk-index.yml"
    template: "./templates/file-risk-index.yml"
    scale_min: 1
    scale_max: 5
    default_min_score_for_sweep: 4
    default_sweep_limit: 5
    scoring_dimensions:
      - "attacker_controlled_input"
      - "externally_influenced_state"
      - "trust_boundary_crossing"
      - "security_decision"
      - "dangerous_sink"
      - "parser_complexity"
      - "privilege_boundary"
      - "asset_sensitivity"
      - "historical_vulnerability_density"
      - "validation_feasibility"

  file_sweep:
    enabled: true
    mode: "sequential"
    prompt: "./prompts/phase-2-file.md"
    runner: "./tools/run-file-sweep.py"
    index_lister: "./tools/list-risk-files.py"
    assignment: "one_file_per_run"
    default_min_score: 4
    default_limit: 5
    allow_parallel_future: true

  semantic_deduplication:
    enabled: true
    phase: "counter_analysis"
    compare_fields:
      - "category"
      - "target_area"
      - "files"
      - "symbols"
      - "entry_points"
      - "sources"
      - "sinks"
      - "trust_boundary"
      - "assets_at_risk"

  # Per-phase extra instructions appended to the phase prompt.
  # These are persistent and always applied when the phase runs.
  # See also: PROMPT_EXTRA and PROMPT_EXTRA_FILE env vars for ad-hoc use.
  #
  # extra_prompts:
  #   reconnaissance: |
  #     Focus sandbox on ASAN builds.
  #     Skip fuzzing harness for now.
  #   hypothesis_generation: |
  #     Prioritize memory safety issues over logic bugs.

  scope:
    include:
      - "src/**"
    exclude:
      - "src/**/.git/**"
      - "src/**/.svn/**"
      - "src/**/.hg/**"
      - "src/**/node_modules/**"
      - "src/**/vendor/**"
      - "src/**/packages/**"
      - "src/**/bin/**"
      - "src/**/obj/**"
      - "src/**/target/**"
      - "src/**/build/**"
      - "src/**/dist/**"
      - "src/**/.next/**"
      - "src/**/.gradle/**"
      - "src/**/.idea/**"
      - "src/**/.vscode/**"

  focus:
    - "Authentication and authorization flaws"
    - "Injection vulnerabilities"
    - "Memory safety issues"
    - "Path traversal"
    - "Unsafe deserialization"
    - "Cryptographic misuse"
    - "Secrets exposure"
    - "Business logic vulnerabilities"
    - "Supply chain risks"
    - "Insecure configuration"
    - "Improper input validation"
    - "Server-side request forgery"
    - "File upload vulnerabilities"
    - "Race conditions"
    - "Privilege escalation"

environment:
  type: "sandbox"
  path: "./sandbox"
  startup_command: "./sandbox/scripts/up.sh"
  shell_command: "./sandbox/scripts/shell.sh"
  reset_command: "./sandbox/scripts/reset.sh"
  logs_command: "./sandbox/scripts/logs.sh"
  clean_command: "./sandbox/scripts/clean.sh"

validation:
  worker_count: 1
  allow_destructive_actions_inside_sandbox: true
  allow_source_modification: false

  allowed_write_paths:
    - "./itemdb"
    - "./runs"
    - "./sandbox"
    - "./templates"
    - "./tmp"
    - "./tools"
    - "./.opencode"

  methods:
    - "static_proof"
    - "unit_test"
    - "integration_test"
    - "runtime_reproduction"
    - "sanitizer_detection"
    - "crash_reproduction"
    - "http_exploit"
    - "cli_exploit"
    - "file_based_trigger"
    - "config_based_trigger"
    - "symbolic_or_manual_trace"
    - "benchmark_oracle_comparison"

  confirmation_policy:
    - "A finding may only be marked CONFIRMED when clear evidence exists."
    - "Benchmark labels alone are not enough to mark a finding CONFIRMED."
    - "If runtime validation is not practical, a strong static proof may be acceptable, but the limitation must be documented."
    - "If assumptions cannot be validated, keep the finding in PENDING or move it to REJECTED."

reporting:
  format: "markdown"
  findings_dir: "./itemdb/findings"
  evidence_dir: "./itemdb/evidence"
  reports_dir: "./itemdb/reports"
  default_status: "PENDING"

finding:
  id_prefix: "CC"
  template: "./templates/finding.md"

  statuses:
    - "PENDING"
    - "CONFIRMED"
    - "EXPLOITED"
    - "REJECTED"
    - "DUPLICATE"

  severities:
    - "CRITICAL"
    - "HIGH"
    - "MEDIUM"
    - "LOW"
    - "INFO"

  confidences:
    - "LOW"
    - "MEDIUM"
    - "HIGH"
    - "CONFIRMED"

skills:
  directory: "./.opencode/skills"
  selection_policy:
    - "Use generic skills by default."
    - "Use target-specific skills only when the target profile, language, or framework matches."
    - "Do not hardcode the workflow around a single target type."

agents:
  directory: "./.opencode/agents"
  default_mode: "single_agent_sequential"

  # Optional per-agent model and variant pinning consumed by
  # tools/run-agent.py (the wrapper used by `make phase-*`).
  # Resolution priority: OPENCODE_ARGS > env (CODECOME_MODEL,
  # CODECOME_MODEL_VARIANT) > codecome.yml > unknown.
  #
  # Uncomment and adjust to pin specific models per phase:
  #
  # recon:
  #   model: "anthropic/claude-opus-4-7"
  #   variant: "high"
  # auditor:
  #   model: "anthropic/claude-opus-4-7"
  # reviewer:
  #   model: "anthropic/claude-opus-4-7"
  # validator:
  #   model: "anthropic/claude-opus-4-7"
  # exploiter:
  #   model: "anthropic/claude-opus-4-7"
  # reporter:
  #   model: "anthropic/claude-opus-4-7"

future:
  parallel_validation:
    enabled: false
    intended_model:
      - "One validation worker per finding."
      - "Each worker must have isolated runtime state."
      - "Each worker writes only to its finding evidence directory and run directory."
      - "Docker Compose project names or disposable VMs may be used for isolation."
  parallel_file_sweep:
    enabled: false
    intended_model:
      - "One hypothesis-generation worker per high-risk file."
      - "Workers should use the file risk index as their assignment source."
      - "Each worker should write findings through the normal itemdb lifecycle."
      - "Semantic deduplication must run after each batch."
