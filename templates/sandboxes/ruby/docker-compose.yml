services:
  codecome-sandbox:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace
    volumes:
      - ../:/workspace
      - codecome-bundle:/usr/local/bundle
    tty: true
    stdin_open: true
    security_opt:
      - seccomp:unconfined
    ports:
      - "__APP_PORT__:__APP_PORT__"

volumes:
  codecome-bundle:
