services:
  codecome-sandbox:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace
    volumes:
      - ../:/workspace
      - codecome-m2:/root/.m2
      - codecome-gradle:/root/.gradle
    tty: true
    stdin_open: true
    security_opt:
      - seccomp:unconfined
    ports:
      - "__APP_PORT__:__APP_PORT__"

volumes:
  codecome-m2:
  codecome-gradle:
