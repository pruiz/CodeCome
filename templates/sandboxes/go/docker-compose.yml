services:
  codecome-sandbox:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace
    volumes:
      - ../:/workspace
    tty: true
    stdin_open: true
    security_opt:
      - seccomp:unconfined
    ports:
      - "__APP_PORT__:__APP_PORT__"
