services:
  codecome-sandbox:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace
    volumes:
      - ../:/workspace
      - ../.tools/codeql/current:/opt/codeql:ro
    tty: true
    stdin_open: true
    security_opt:
      - seccomp:unconfined
    cap_add:
      - SYS_PTRACE
    devices:
      # Optional KVM acceleration. Comment out if /dev/kvm is unavailable.
      - "/dev/kvm:/dev/kvm"
