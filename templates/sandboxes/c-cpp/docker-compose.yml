services:
  codecome-sandbox:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace
    volumes:
      - ../:/workspace
      - ../.tools:/workspace/.tools:ro
    tty: true
    stdin_open: true
    security_opt:
      - seccomp:unconfined
    cap_add:
      - SYS_PTRACE
