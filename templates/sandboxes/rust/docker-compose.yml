services:
  codecome-sandbox:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace
    volumes:
      - ../:/workspace
      - ../.tools/codeql/current:/opt/codeql:ro
      - codecome-cargo-target:/workspace/src/target
      - codecome-cargo-registry:/usr/local/cargo/registry
    tty: true
    stdin_open: true
    security_opt:
      - seccomp:unconfined
    ports:
      - "__APP_PORT__:__APP_PORT__"

volumes:
  codecome-cargo-target:
  codecome-cargo-registry:
