# CodeQL analysis plan generated by Phase 1a target profiling.
# The model fills in language entries based on source tree analysis.
# Consumed by CodeQL run orchestration (tools/codeql/runner.py).

schema_version: 2
generated_by: "phase-1a-profile"

source_path: "./src"
recommended: true

analysis_units: []
# Example analysis units discovered under ./src:
#
# analysis_units:
#   - id: "api"
#     path: "./src/api"
#     kind: "service"
#     primary: true
#     sandbox_build_target: "root"        # references a build_target id in sandbox-recipe.yml
#     languages:
#       - id: "python"
#         confidence: "HIGH"
#         build_mode: "none"
#         build_provider: "none"           # "sandbox-recipe" or "none"
#         build_command: null
#         packs:
#           - "official"
#           - "github-security-lab"
#
#   - id: "native-lib"
#     path: "./src/native"
#     kind: "library"
#     primary: false
#     sandbox_build_target: "native-lib"  # references a build_target id in sandbox-recipe.yml
#     languages:
#       - id: "c-cpp"
#         confidence: "HIGH"
#         build_mode: "manual"
#         build_provider: "sandbox-recipe"  # resolved from sandbox-recipe.yml after Phase 1b
#         build_command: null               # derived from recipe; leave empty when build_provider is "sandbox-recipe"
#         db_create_timeout: 1800   # optional: seconds, model-estimated from source size
#         analyze_timeout: 900      # optional: seconds, per query-profile run
#         packs:
#           - "official"
#           - "github-security-lab"
#           - "trailofbits"
#           - "coding-standards"
#
# v2 changes:
#   - sandbox_build_target on analysis units links to sandbox-recipe.yml build_targets.
#   - build_provider on language entries controls where the build command comes from.
#     Use "sandbox-recipe" for compiled languages (the sandbox provides the build command).
#     Use "none" for no-build languages (python, javascript-typescript, ruby).
#   - build_command should be left empty when build_provider is "sandbox-recipe"
#     (the runner resolves it from the recipe).  Only provide build_command directly
#     when the build cannot be expressed through the recipe.
#
# Allowed language IDs: python, javascript-typescript, ruby, c-cpp, go, csharp, java-kotlin, swift
# Allowed confidence values: HIGH, MEDIUM, LOW
# Allowed build_mode values by language:
#   none: python, javascript-typescript, ruby, csharp, java-kotlin
#   manual/autobuild: c-cpp, go, csharp, java-kotlin, swift
# Allowed pack profile names: official, github-security-lab, trailofbits, coding-standards, local
#
# Optional per-language timeout overrides (seconds):
#   - db_create_timeout: max seconds for 'codeql database create' (default 600)
#   - analyze_timeout: max seconds for 'codeql database analyze' per profile (default 600)
#   Use CODEQL_DB_CREATE_TIMEOUT / CODEQL_ANALYZE_TIMEOUT env vars to override at runtime.

exclude:
  - "src/**/tests/**"
  - "src/**/fixtures/**"
  - "src/**/vendor/**"
  - "src/**/node_modules/**"

notes: []
